name: Compilar Python + Playwright a EXE desde Features

on:
  push:
    branches: [ "features", "features/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias y PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Compilar Script con PyInstaller (Imágenes y Playwright)
      run: |
        # Compila el ejecutable (se guardará en la carpeta dist/)
        pyinstaller --onefile --noconsole --collect-all playwright --add-data "app/assets;app/assets" main.py

    - name: Preparar carpeta de entrega para el usuario
      run: |
        # Crear la carpeta
        New-Item -ItemType Directory -Force -Path entregable
        # Mover el ejecutable
        Move-Item -Path dist\main.exe -Destination entregable\
        # Copiar el Excel usando rutas relativas explícitas
        Copy-Item -Path .\Oficios.xlsx -Destination entregable\

    - name: Guardar el entregable como Artefacto (ZIP)
      uses: actions/upload-artifact@v4
      with:
        name: wizard-finalizacion-folios
        # Apuntamos a la carpeta completa en lugar de solo al .exe
        path: entregable/