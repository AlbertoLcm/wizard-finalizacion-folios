name: Compilar Python + Playwright a EXE desde Features

on:
  push:
    branches: [ "features", "features/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias y PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Compilar Script con PyInstaller (Imágenes y Playwright)
      run: |
        # Usamos main.py y copiamos app/assets a la misma ruta dentro del .exe
        pyinstaller --onefile --noconsole --collect-all playwright --add-data "app/assets;app/assets" main.py

    - name: Guardar el ejecutable como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: bot-wizard-exe
        path: dist/main.exe